<!DOCTYPE html>

<html>

<head>
    <meta charset="UTF-8">
    <title>代办清单</title>
    <style>
        body {
            background: #f0f0f0;
            font-family: sans-serif;
            max-width: 500px;
            margin: 40px auto;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        form[action="/add"] {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        form[action="/add"] input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        li {
            background: white;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        button {
            background: #0071e3;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>我的待办清单</h1>

    <form action="/add" method="POST">
        <input type="text" name="task_name" placeholder="输入任务…">
        <button type="submit">添加</button>
    </form>
    
    <ul>
        {% for name,done in tasks.items() %}
            <li>
            {% if done == 1 %}
                <del>{{ name }}</del>
            {% else %}
                {{ name }}
            {% endif %}

            <form action="/done" method="POST" style="display: inline;">
                <input type="hidden" name="task_name" value="{{ name }}">
                <button type="submit">完成</button>
            </form>
            <form action="/delete" method="POST" style="display: inline;">
                <input type="hidden" name="task_name" value="{{ name }}">
                <button type="submit">删除</button>
            </form>
            </li>
        {% endfor %}
    </ul>

</body>
</html>
